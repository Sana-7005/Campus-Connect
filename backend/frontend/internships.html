<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Internships | Campus Connect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --ios-blue: #007aff;
      --text-dark: #0a2540;
      --text-muted: #5b6b7c;
      --glass-bg: rgba(255, 255, 255, 0.75);
      --glass-border: rgba(255, 255, 255, 0.4);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", Inter, sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #f4f8ff, #eef4ff, #ffffff);
      color: var(--text-dark);
    }

    /* NAVBAR
    .main-nav {
      display: flex;
      gap: 22px;
      padding: 18px 28px;
      backdrop-filter: blur(18px);
      background: rgba(255,255,255,0.7);
      border-bottom: 1px solid var(--glass-border);
    }

    .main-nav a {
      text-decoration: none;
      color: var(--text-muted);
      font-weight: 500;
    }

    .main-nav a.active {
      color: var(--ios-blue);
      font-weight: 600;
    }

    .profile-bubble {
      margin-left: auto;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--ios-blue);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
    } */

    header {
      text-align: center;
      padding: 56px 20px 32px;
    }

    header h1 {
      font-size: 2.6rem;
    }

    header p {
      color: var(--text-muted);
      max-width: 700px;
      margin: 10px auto 0;
    } 

    /* CONTROLS */
    .controls {
      max-width: 1200px;
      margin: 0 auto 30px;
      padding: 0 20px;
    }

    .controls select {
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      font-weight: 500;
    }

    /* GRID */
    .container {
      max-width: 1200px;
      margin: auto;
      padding: 0 20px 60px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    /* CARD */
    .card {
      position: relative;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 22px;
      padding: 22px;
      backdrop-filter: blur(18px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.06);
      transition: transform 0.4s var(--ease);
    }

    .card:hover {
      transform: translateY(-6px);
    }

    .company {
      color: var(--ios-blue);
      font-weight: 600;
    }

    .meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin: 8px 0;
    }

    .tags {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.75rem;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.06);
    }

    /* STATUS */
    .status {
      display: inline-block;
      font-size: 0.7rem;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .running { background: rgba(52,199,89,0.15); color: #1c7c3a; }
    .closing-soon { background: rgba(255,204,0,0.2); color: #8a6d00; }
    .closed { background: rgba(255,59,48,0.15); color: #a10000; }

    /* APPLY */
    .apply-btn {
      margin-top: 18px;
      width: 100%;
      padding: 12px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #007aff, #5ac8fa);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.25s var(--ease), box-shadow 0.25s var(--ease);
      box-shadow: 0 12px 25px rgba(0,122,255,0.25);
    }

    .apply-btn:hover {
      transform: translateY(-2px);
    }

    .apply-btn[disabled] {
      background: #aaa;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* SAVE */
    .save-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      cursor: pointer;
      font-size: 1.2rem;
    }

    .save-btn.saved { color: gold; }

    /* MODAL */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .modal-backdrop.show {
      opacity: 1;
    }

    .modal {
      background: var(--glass-bg);
      padding: 32px;
      border-radius: 22px;
      width: 360px;
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      transform: scale(0.9) translateY(20px);
      transition: transform 0.3s var(--ease);
    }

    .modal-backdrop.show .modal {
      transform: scale(1) translateY(0);
    }

    .modal h3 {
      margin: 0 0 10px 0;
      font-size: 1.5rem;
      color: var(--text-dark);
    }

    .modal p {
      margin: 0 0 8px 0;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .modal .company-info {
      font-weight: 600;
      color: var(--ios-blue);
      margin-bottom: 20px;
      font-size: 1.1rem;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(40px);
      background: rgba(50,205,50,0.95);
      backdrop-filter: blur(12px);
      color: white;
      padding: 16px 28px;
      border-radius: 16px;
      font-weight: 600;
      font-size: 1rem;
      opacity: 0;
      transition: opacity 0.4s ease, transform 0.4s ease;
      box-shadow: 0 10px 30px rgba(50,205,50,0.4);
      z-index: 10000;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.hide {
      opacity: 0;
      transform: translateX(-50%) translateY(-20px);
    }
  </style>
  <link rel="stylesheet" href="css/pages.css">
</head>

<body>

<nav class="main-nav">
  <a href="student-dashboard.html">Dashboard</a>
  <a href="jobs.html">Jobs</a>
  <a href="internships.html" class="active">Internships</a>
  <a href="practice.html">Practice</a>
  <a href="research.html">Research</a>
  <a href="ats.html">ATS</a>
  <a href="updates.html">Hiring Updates</a>
  <a href="profile.html" class="active">RK</a>
</nav>

<header>
  <h1>Internship Opportunities</h1>
  <p>Smartly curated internships with real-time status detection.</p>
</header>

<div class="controls">
  <select id="sortSelect">
    <option value="all">All Internships</option>
    <option value="running">Running</option>
    <option value="closing-soon">Closing Soon</option>
    <option value="closed">Closed</option>
    <option value="stipend">Highest Stipend</option>
    <option value="deadline">Ending Soon</option>
  </select>
</div>

<div class="container" id="internshipContainer"></div>

<!-- MODAL -->
<div class="modal-backdrop" id="applyModal">
  <div class="modal">
    <h3>Submit Application</h3>
    <div class="company-info" id="modalCompanyInfo"></div>
    <p>Your profile will be shared with the company.</p>
    <button class="apply-btn" id="confirmApply">Submit Application</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  let internships = [];
  let saved = JSON.parse(localStorage.getItem("savedInternships")) || [];
  let currentInternship = null;

  fetch("/api/internships")
    .then(res => res.json())
    .then(data => { internships = data; render(data); });

  const modal = document.getElementById("applyModal");
  const toast = document.getElementById("toast");
  const modalCompanyInfo = document.getElementById("modalCompanyInfo");

  document.getElementById("sortSelect").onchange = e => {
    let v = e.target.value;
    let data = [...internships];

    if (["running","closing-soon","closed"].includes(v))
      data = data.filter(i => getStatus(i) === v);

    if (v === "stipend")
      data.sort((a,b)=>num(b.stipend)-num(a.stipend));

    if (v === "deadline")
      data.sort((a,b)=>new Date(a.apply_by)-new Date(b.apply_by));

    render(data);
  };

  function getStatus(i){
    const d = Math.ceil((new Date(i.apply_by)-new Date())/86400000);
    if(d<0) return "closed";
    if(d<=7) return "closing-soon";
    return "running";
  }

  function num(s){ return +s.replace(/[^\d]/g,""); }

  function render(data){
    const c = document.getElementById("internshipContainer");
    c.innerHTML="";
    data.forEach((i,idx)=>{
      const st=getStatus(i);
      const savedClass=saved.includes(i.id)?"saved":"";
      c.innerHTML+=`
      <div class="card">
        <span class="save-btn ${savedClass}" onclick="toggleSave(${i.id},this)"></span>
        <span class="status ${st}">${st.replace("-"," ").toUpperCase()}</span>
        <h3>${i.role}</h3>
        <div class="company">${i.company}</div>
        <div class="meta">${i.location} · ${i.mode}<br>Duration: ${i.duration} · ${i.stipend}</div>
        <p class="meta">${i.description}</p>
        <div class="tags">${i.skills.map(s=>`<span class="tag">${s}</span>`).join("")}</div>
        <button class="apply-btn" ${st==="closed"?"disabled":""} onclick="openApply(${idx})">
          ${st==="closed"?"Closed":"Apply Now"}
        </button>
      </div>`;
    });
  }

  function toggleSave(id,el){
    if(saved.includes(id)) saved=saved.filter(x=>x!==id);
    else saved.push(id);
    localStorage.setItem("savedInternships",JSON.stringify(saved));
    el.classList.toggle("saved");
  }

  function openApply(idx){ 
    currentInternship = internships[idx];
    modalCompanyInfo.textContent = `${currentInternship.role} at ${currentInternship.company}`;
    modal.classList.remove("hide");
    modal.style.display="flex"; 
    setTimeout(() => modal.classList.add("show"), 10);
  }

  function closeModal() {
    modal.classList.remove("show");
    modal.classList.add("hide");
    setTimeout(() => {
      modal.style.display="none";
      modal.classList.remove("hide");
    }, 400);
  }

  document.getElementById("confirmApply").onclick=()=>{
    closeModal();
    
    toast.textContent = `Applied for ${currentInternship.role} at ${currentInternship.company}!`;
    toast.classList.remove("hide");
    toast.classList.add("show");
    
    setTimeout(()=>{
      toast.classList.remove("show");
      toast.classList.add("hide");
    }, 3000);
  };

  modal.onclick=e=>{ 
    if(e.target===modal) {
      closeModal();
    }
  };
</script>

</body>
</html>
