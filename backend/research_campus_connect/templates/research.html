<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Research - Campus Research Connect</title>
    <link rel="stylesheet" href="/static/css/research.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="nav-container">
        <h1 class="logo">Campus Research Connect</h1>
        <ul class="nav-menu">
          <li><a href="/" class="nav-link">Home</a></li>
          <li><a href="/dashboard" class="nav-link">Dashboard</a></li>
          <li><a href="/research" class="nav-link active">Research</a></li>
          <li><a href="/participate" class="nav-link">Participate</a></li>
          <li><a href="/faculty" class="nav-link">Faculty</a></li>
        </ul>
      </div>
    </nav>

    <header class="page-header">
      <h1>Research Papers</h1>
      <p>Explore research published by faculty and students</p>
    </header>

    <section class="controls">
      <input
        id="search-input"
        type="text"
        placeholder="Search by title, author or keyword"
      />
      <select id="domain-filter">
        <option value="">All Domains</option>
        <option value="5G Networks">5G Networks</option>
        <option value="Agriculture & AI">Agriculture & AI</option>
        <option value="Antenna Design & IoT">Antenna Design & IoT</option>
        <option value="Artificial Intelligence">Artificial Intelligence</option>
        <option value="Bioinformatics">Bioinformatics</option>
        <option value="Biometric Security">Biometric Security</option>
        <option value="Blockchain & IoT">Blockchain & IoT</option>
        <option value="Cloud Computing">Cloud Computing</option>
        <option value="Computer Vision">Computer Vision</option>
        <option value="Data Science">Data Science</option>
        <option value="Healthcare AI">Healthcare AI</option>
        <option value="IoT & Agriculture">IoT & Agriculture</option>
        <option value="Machine Learning">Machine Learning</option>
        <option value="Medical Image Analysis">Medical Image Analysis</option>
        <option value="Natural Language Processing">
          Natural Language Processing
        </option>
        <option value="Network Security">Network Security</option>
        <option value="Quantum Computing">Quantum Computing</option>
        <option value="Robotics & AI">Robotics & AI</option>
        <option value="Smart Cities">Smart Cities</option>
        <option value="Soft Computing">Soft Computing</option>
        <option value="VLSI">VLSI</option>
        <option value="Wireless Communication">Wireless Communication</option>
      </select>
      <select id="year-filter">
        <option value="">All Years</option>
        <option value="2024">2024</option>
        <option value="2023">2023</option>
      </select>
      <button id="clear-filters">Clear</button>
    </section>

    <section class="content">
      <p id="papers-count" class="count"></p>
      <div id="papers-container" class="grid"></div>
      <p id="loading" class="loading">Loading papers...</p>
      <p id="no-results" class="empty">No papers found.</p>
    </section>

    <footer class="footer">
      <p>© 2025 Campus Research Connect</p>
    </footer>

    <script src="/static/js/research.js"></script>
  </body>
</html>
