<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile | Campus Connect</title>
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/profile.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="main-nav">
  <a href="student-dashboard.html">Dashboard</a>
  <a href="jobs.html">Jobs</a>
  <a href="internships.html">Internships</a>
  <a href="practice.html">Practice</a>
  <a href="research.html">Research</a>
  <a href="ats.html">ATS Checker</a>
  <a href="updates.html">Hiring Updates</a>
  <a href="profile.html" class="profile-bubble">
    <span id="navProfileInitials">RK</span>
  </a>
</nav>

<div class="page-container">
  
  <form id="profileForm" class="main-grid">
    
    <section class="card header-section full-width">
      <div class="photo-upload-container">
        <div class="photo-wrapper">
          <img id="photoPreview" src="https://via.placeholder.com/150?text=User" alt="Profile">
          <label for="profilePhoto" class="upload-overlay">
            <span>📷</span>
          </label>
        </div>
        <input id="profilePhoto" type="file" accept="image/*" hidden>
      </div>

      <div class="identity-inputs">
        <h1>Student Profile</h1>
        <p class="subtitle">Manage your academic and personal details</p>
        
        <div class="grid-2">
          <div class="input-group">
            <label>Full Name</label>
            <input id="fullName" type="text" placeholder="e.g. Rahul Sharma">
          </div>
          <div class="input-group">
            <label>University Email</label>
            <input id="email" type="email" placeholder="student@university.edu">
          </div>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>🏛️ University Details</h2>
      <div class="input-group">
        <label>University Name</label>
        <input id="universityName" type="text" placeholder="Institute Name">
      </div>
      
      <div class="grid-2">
        <div class="input-group">
          <label>Roll Number</label>
          <input id="rollNumber" type="text">
        </div>
        <div class="input-group">
          <label>Reg. Number</label>
          <input id="registrationNumber" type="text">
        </div>
      </div>

      <div class="input-group">
        <label>Program</label>
        <div class="select-wrapper">
          <select id="program">
            <option value="" disabled selected>Select Program</option>
            <option>B.Tech</option>
            <option>M.Tech</option>
            <option>BCA</option>
            <option>MCA</option>
          </select>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>🎓 Academic Status</h2>
      <div class="input-group">
        <label>Specialization</label>
        <input id="specialization" type="text" placeholder="e.g. CSE (AI & ML)">
      </div>

      <div class="grid-2">
        <div class="input-group">
          <label>Semester</label>
          <div class="select-wrapper">
            <select id="semester">
              <option value="" disabled selected>Sem</option>
              <option>1st</option><option>2nd</option><option>3rd</option>
              <option>4th</option><option>5th</option><option>6th</option>
              <option>7th</option><option>8th</option>
            </select>
          </div>
        </div>
        <div class="input-group">
          <label>Graduation Year</label>
          <input id="graduationYear" type="number" placeholder="2027">
        </div>
      </div>

      <div class="backlog-wrapper">
        <label class="section-label">Backlog Status</label>
        <div class="switch-toggle">
          <input type="radio" id="b_cleared" name="backlog_status" value="cleared" checked>
          <label for="b_cleared">Cleared</label>
          
          <input type="radio" id="b_active" name="backlog_status" value="active">
          <label for="b_active">Active</label>
        </div>
        
        <div id="backlogCount" class="input-group hidden fade-in-up" style="margin-top: 15px;">
          <label>Count</label>
          <input id="backlogNumber" type="number" min="1" max="50" placeholder="How many?">
        </div>
      </div>
    </section>

    <section class="card">
      <h2>📍 Location</h2>
      <div class="input-group">
        <label>City</label>
        <input id="city" type="text">
      </div>
      <div class="grid-2">
        <div class="input-group">
          <label>District</label>
          <input id="district" type="text">
        </div>
        <div class="input-group">
          <label>State</label>
          <input id="state" type="text">
        </div>
      </div>
    </section>

    <section class="card skills-card">
      <h2>🛠️ Technical Skills</h2>
      <div class="skill-input-wrapper">
        <input id="skillInput" type="text" placeholder="e.g., Python, React" autocomplete="off">
        <div class="skill-buttons">
          <button type="button" id="addSkillBtn" class="btn-add-skill">+ Add</button>
          <button type="button" id="clearSkillsBtn" class="btn-clear-skills">Clear All</button>
        </div>
      </div>
      <p id="skillHint" class="skill-hint">⚠️ Please enter a skill first!</p>
      <div id="skillsList" class="skills-display"></div>
    </section>

    <div class="actions full-width">
      <a href="profile.html" class="btn ghost">Cancel</a>
      <button type="submit" class="btn primary">Save Profile</button>
    </div>

  </form>
</div>

<script>
const API_BASE = window.API_BASE_URL || "http://127.0.0.1:5000";
const PROFILE_ENDPOINT = `${API_BASE}/api/profile`;
const PROFILE_STORAGE_KEY = "profileData";
const PHOTO_STORAGE_KEY = "profilePhoto";

const form = document.getElementById("profileForm");
const backlogRadios = document.querySelectorAll('input[name="backlog_status"]');
const backlogCount = document.getElementById("backlogCount");
const photoInput = document.getElementById("profilePhoto");
const photoPreview = document.getElementById("photoPreview");
const skillInput = document.getElementById("skillInput");
const addSkillBtn = document.getElementById("addSkillBtn");
const skillsList = document.getElementById("skillsList");

let userSkills = [];

function renderSkills() {
  skillsList.innerHTML = userSkills.map((skill, index) => 
    `<div class="skill-tag">
      <span>${skill}</span>
      <span class="remove-skill" data-index="${index}">&times;</span>
    </div>`
  ).join('');

  document.querySelectorAll('.remove-skill').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.index);
      userSkills.splice(idx, 1);
      renderSkills();
    });
  });
}

const skillHint = document.getElementById('skillHint');
const clearSkillsBtn = document.getElementById('clearSkillsBtn');

function showHint(message) {
  skillHint.textContent = message;
  skillHint.classList.add('show');
  skillInput.classList.add('shake');
  setTimeout(() => skillInput.classList.remove('shake'), 400);
  setTimeout(() => skillHint.classList.remove('show'), 2500);
}

function addSkill() {
  const skill = skillInput.value.trim().toLowerCase();
  if (!skill) {
    showHint('⚠️ Please enter a skill first!');
    skillInput.focus();
    return;
  }
  if (userSkills.includes(skill)) {
    showHint('⚠️ This skill is already added!');
    skillInput.focus();
    skillInput.select();
    return;
  }
  userSkills.push(skill);
  skillInput.value = '';
  skillHint.classList.remove('show');
  renderSkills();
  skillInput.focus();
}

addSkillBtn.addEventListener('click', addSkill);

clearSkillsBtn.addEventListener('click', () => {
  if (userSkills.length === 0) {
    showHint('⚠️ No skills to clear!');
    return;
  }
  userSkills = [];
  renderSkills();
});

skillInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    addSkill();
  }
});

function toggleBacklogVisibility() {
  const active = document.querySelector('input[name="backlog_status"][value="active"]');
  if (active && active.checked) {
    backlogCount.classList.remove("hidden");
  } else {
    backlogCount.classList.add("hidden");
  }
}

backlogRadios.forEach((radio) => radio.addEventListener("change", toggleBacklogVisibility));
toggleBacklogVisibility();

photoInput.addEventListener('change', () => {
  const f = photoInput.files && photoInput.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    photoPreview.src = ev.target.result;
  };
  reader.readAsDataURL(f);
});

function updateInitials(name) {
  if (!name) return;
  const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
  const nav = document.getElementById('navProfileInitials');
  if (nav) nav.textContent = initials;
}

function populateForm(data) {
  if (!data) return;
  if (data.fullName) document.getElementById('fullName').value = data.fullName;
  if (data.email) document.getElementById('email').value = data.email;
  if (data.universityName) document.getElementById('universityName').value = data.universityName;
  if (data.rollNumber) document.getElementById('rollNumber').value = data.rollNumber;
  if (data.registrationNumber) document.getElementById('registrationNumber').value = data.registrationNumber;
  if (data.program) document.getElementById('program').value = data.program;
  if (data.specialization) document.getElementById('specialization').value = data.specialization;
  if (data.semester) document.getElementById('semester').value = data.semester;
  if (data.graduationYear) document.getElementById('graduationYear').value = data.graduationYear;
  if (data.city) document.getElementById('city').value = data.city;
  if (data.district) document.getElementById('district').value = data.district;
  if (data.state) document.getElementById('state').value = data.state;

  if (data.backlogStatus) {
    const radio = document.querySelector(`input[name="backlog_status"][value="${data.backlogStatus}"]`);
    if (radio) radio.checked = true;
  }
  if (data.backlogNumber !== undefined) {
    document.getElementById('backlogNumber').value = data.backlogNumber || '';
  }

  if (Array.isArray(data.skills)) {
    userSkills = data.skills.map(s => String(s).toLowerCase());
    renderSkills();
  }

  toggleBacklogVisibility();
  updateInitials(data.fullName);
}

function loadFromLocal() {
  try {
    const raw = localStorage.getItem(PROFILE_STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    populateForm(data);
    const savedPhoto = localStorage.getItem(PHOTO_STORAGE_KEY) || data.photo;
    if (savedPhoto) photoPreview.src = savedPhoto;
  } catch (e) {
    console.warn('Could not load profile data from localStorage', e);
  }
}

function persistLocal(data, photoDataUrl) {
  const stored = { ...data };
  if (photoDataUrl) {
    stored.photo = photoDataUrl;
    localStorage.setItem(PHOTO_STORAGE_KEY, photoDataUrl);
  }
  localStorage.setItem(PROFILE_STORAGE_KEY, JSON.stringify(stored));
}

async function loadProfile() {
  const savedPhoto = localStorage.getItem(PHOTO_STORAGE_KEY);
  if (savedPhoto) photoPreview.src = savedPhoto;

  try {
    const resp = await fetch(PROFILE_ENDPOINT);
    if (resp.ok) {
      const p = await resp.json();
      populateForm(p);
      persistLocal(p, savedPhoto);
      return;
    }
  } catch (e) {
    console.warn('Could not fetch profile from backend', e);
  }

  loadFromLocal();
}

function gatherFormData() {
  return {
    fullName: document.getElementById('fullName').value || '',
    email: document.getElementById('email').value || '',
    universityName: document.getElementById('universityName').value || '',
    rollNumber: document.getElementById('rollNumber').value || '',
    registrationNumber: document.getElementById('registrationNumber').value || '',
    program: document.getElementById('program').value || '',
    specialization: document.getElementById('specialization').value || '',
    semester: document.getElementById('semester').value || '',
    graduationYear: document.getElementById('graduationYear').value || '',
    backlogStatus: (document.querySelector('input[name="backlog_status"]:checked')||{}).value || '',
    backlogNumber: Number(document.getElementById('backlogNumber').value) || 0,
    city: document.getElementById('city').value || '',
    district: document.getElementById('district').value || '',
    state: document.getElementById('state').value || '',
    skills: [...userSkills]
  };
}

function readFileAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (ev) => resolve(ev.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = gatherFormData();
  const file = photoInput.files && photoInput.files[0];
  let photoDataUrl = localStorage.getItem(PHOTO_STORAGE_KEY) || null;

  if (file) {
    try {
      photoDataUrl = await readFileAsDataUrl(file);
    } catch (err) {
      console.error('Could not read photo', err);
    }
  }

  try {
    const resp = await fetch(PROFILE_ENDPOINT, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    const result = await resp.json().catch(() => ({}));
    if (!resp.ok) throw new Error(result.error || 'Save failed');

    const savedProfile = result.profile || data;
    persistLocal(savedProfile, photoDataUrl);

    const btn = document.querySelector('.btn.primary');
    const originalText = btn.innerText;
    btn.innerText = "Saved! ✓";
    btn.style.background = "#10b981";
    setTimeout(() => {
      btn.innerText = originalText;
      btn.style.background = "";
      location.href = 'profile.html';
    }, 800);
  } catch (err) {
    alert("Could not save profile. Please try again.");
    console.error(err);
  }
});

loadProfile();
</script>
</body>
</html>
