<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Hiring Updates | Campus Connect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --glass: rgba(255, 255, 255, 0.7);
      --border: rgba(255, 255, 255, 0.45);
      --blue: #007aff;
      --text: #0a2540;
      --muted: #6b7c93;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #eef3ff, #f7f9ff, #ffffff);
      color: var(--text);
      padding: 0px;
    }

    /* Header Card */
    .header-card {
      background: var(--glass);
      backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 20px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow);
      margin-bottom: 22px;
    }

    .header-card h1 {
      font-size: 1.6rem;
      font-weight: 700;
    }

    .notif-badge {
      background: linear-gradient(135deg, #ff3b30, #ff6b6b);
      color: white;
      font-size: 0.75rem;
      padding: 6px 12px;
      border-radius: 999px;
      font-weight: 600;
      box-shadow: 0 6px 14px rgba(255, 59, 48, 0.35);
    }

    /* Updates Container */
    .updates-container {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin: 0 auto 40px auto;
      max-width: 500px;
      width: 500px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid var(--border);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    /* Update Card */
    .update-card {
      position: relative;
      display: grid;
      grid-template-columns: 6px 1fr auto;
      gap: 16px;
      padding: 18px 20px;
      border-radius: 20px;
      background: linear-gradient(180deg,
          rgba(255, 255, 255, 0.95),
          rgba(255, 255, 255, 0.88));
      border: 1px solid rgba(15, 23, 42, 0.06);
      box-shadow:
        0 12px 30px rgba(2, 6, 23, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.6);
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      overflow: hidden;
    }

    .update-card:hover {
      transform: translateY(-6px);
      box-shadow:
        0 22px 50px rgba(2, 6, 23, 0.14),
        inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    .status-rail {
      width: 6px;
      border-radius: 999px;
    }

    .applied .status-rail {
      background: #0a84ff;
    }

    .selected .status-rail {
      background: #34c759;
    }

    .shortlisted .status-rail {
      background: #ffd60a;
    }

    .rejected .status-rail {
      background: #ff453a;
    }

    .new .status-rail {
      background: #0a84ff;
    }

    .update-info h3 {
      font-size: 0.95rem;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .update-info p {
      font-size: 0.82rem;
      color: var(--muted);
    }

    /* Status Pills */
    .status-pill {
      font-size: 11px;
      padding: 7px 14px;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
    }

    .applied {
      background: linear-gradient(135deg, #0a84ff, #6ab8ff);
      color: white;
    }

    .selected {
      background: linear-gradient(135deg, #34c759, #6ee7a5);
      color: #053b22;
    }

    .shortlisted {
      background: linear-gradient(135deg, #ffd60a, #ffec99);
      color: #6b5200;
    }

    .rejected {
      background: linear-gradient(135deg, #ff453a, #ff9a9a);
      color: #5a0000;
    }

    .new {
      background: linear-gradient(135deg, #0a84ff, #6ab8ff);
      color: white;
    }

    /* Unread Indicator */
    .unread-dot {
      width: 9px;
      height: 9px;
      background: #ff3b30;
      border-radius: 50%;
      position: absolute;
      right: 140px;
      /* space before status pill */
      top: 50%;
      transform: translateY(-50%);
      box-shadow: 0 0 0 4px rgba(255, 59, 48, 0.18);
    }

    .update-info h3 {
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
    }

    .update-info .role {
      font-size: 13px;
      color: #475569;
      margin-bottom: 6px;
    }

    .update-info .preview {
      font-size: 14px;
      color: #64748b;
      line-height: 1.4;
    }



    /* Modal */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-content {
      width: 92%;
      max-width: 520px;
      background: linear-gradient(135deg,
          rgba(248, 251, 255, 0.98),
          rgba(232, 241, 255, 0.95));
      backdrop-filter: blur(22px);
      border-radius: 26px;
      padding: 30px;
      box-shadow:
        0 30px 70px rgba(15, 23, 42, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
    }

    .empty-state h3 {
      font-size: 18px;
      margin-bottom: 8px;
      color: #0f172a;
    }

    .empty-state p {
      font-size: 14px;
      line-height: 1.5;
    }


    @keyframes pop {
      from {
        transform: translateY(12px) scale(0.96);
        opacity: 0;
      }

      to {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    .modal-content h2 {
      font-size: 1.35rem;
      margin-bottom: 6px;
    }

    .modal-content h4 {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 18px;
    }

    .modal-content p {
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .close-btn {
      margin-top: 24px;
      width: 100%;
      padding: 14px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #007aff, #5fa8ff);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(0, 122, 255, 0.35);
    }

    /* Modal action buttons (primary / secondary) */
    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 18px;
    }

    .modal-actions button {
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      border: none;
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
    }

    .modal-actions .primary {
      background: linear-gradient(135deg, var(--blue), #5fa8ff);
      color: #ffffff;
      box-shadow: 0 12px 26px rgba(0, 122, 255, 0.22);
    }

    .modal-actions .primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 40px rgba(0, 122, 255, 0.28);
    }

    .modal-actions .secondary {
      background: rgba(255,255,255,0.7);
      color: var(--text);
      border: 1px solid rgba(10,37,64,0.06);
      box-shadow: 0 8px 20px rgba(15,23,42,0.06);
    }

    .modal-actions .secondary:hover {
      background: rgba(255,255,255,0.85);
      transform: translateY(-1px);
    }
  </style>

  <link rel="stylesheet" href="css/pages.css">
</head>

<body>

  <nav class="main-nav">
    <a href="student-dashboard.html">Dashboard</a>
    <a href="jobs.html">Jobs</a>
    <a href="internships.html">Internships</a>
    <a href="practice.html">Practice</a>
    <a href="research.html">Research</a>
    <a href="ats.html">ATS Checker</a>
    <a href="updates.html" class="active">Hiring Updates</a>
    <a href="profile.html" class="profile-bubble active"><span>RK</span></a>
  </nav>

  <div class="header-card">
    <h1>Hiring Updates</h1>
    <span class="notif-badge" id="notifCount">0</span>
  </div>

  <div class="updates-container" id="updatesContainer"></div>

  <!-- Modal -->
  <div class="modal" id="mailModal">
    
    <div class="modal-content">
      <h2 id="modalCompany"></h2>
      <h4 id="modalRole"></h4>
      <p id="modalMessage"></p>
      <div class="modal-actions">
        <button class="secondary">Open Email</button>
        <button class="primary">Mark as Read</button>
      </div>
      <button class="close-btn" onclick="closeModal()">Close</button>
    </div>
  </div>

  <script>
    const container = document.getElementById("updatesContainer");
    const notifCount = document.getElementById("notifCount");
    let updates = [];

    async function loadUpdates() {
      try {
        const profileRes = await fetch("http://127.0.0.1:5000/api/profile");
        const profile = profileRes.ok ? await profileRes.json() : {};

        if (!profile.email) {
          console.warn("No email found in profile");
          return;
        }

        const res = await fetch(
          `http://127.0.0.1:5000/api/hiring-updates?email=${encodeURIComponent(profile.email)}`
        );
        updates = await res.json();

        console.log(`Loaded ${updates.length} hiring updates`);
        renderUpdates();
      } catch (error) {
        console.error("Error loading updates:", error);
      }
    }

    function renderUpdates() {
      container.innerHTML = "";
      const unreadCount = updates.filter(u => u.unread).length;
      notifCount.textContent = unreadCount;

      if (updates.length === 0) {
        container.innerHTML = `
          <div style="text-align: center; padding: 40px; color: var(--muted);">
            <p>No hiring updates yet. Apply to jobs to see updates here!</p>
          </div>
        `;
        return;
      }

      if (!updates.length) {
        container.innerHTML = `
    <div class="empty-state">
      <h3>No hiring updates yet</h3>
      <p>Apply to jobs to start receiving updates here.</p>
    </div>
  `;
        notifCount.textContent = 0;
        return;
      }


      updates.forEach((u, index) => {
        const card = document.createElement("div");
        card.className = "update-card";

        card.innerHTML = `
  <div class="status-rail ${u.status}"></div>

  <div class="update-info">
    <h3>${u.company}</h3>
    <p class="role">${u.role}</p>
    <p class="preview">${u.message.slice(0, 70)}...</p>
  </div>

  <div class="right">
    ${u.unread ? `<span class="unread-dot"></span>` : ""}
    <span class="status-pill ${u.status}">${u.status}</span>
  </div>
`;


        card.onclick = () => openModal(index);
        container.appendChild(card);
      });
    }

    function openModal(index) {
      const u = updates[index];
      u.unread = false;

      document.getElementById("modalCompany").textContent = u.company;
      document.getElementById("modalRole").textContent = u.role;
      document.getElementById("modalMessage").textContent = u.message;

      document.getElementById("mailModal").style.display = "flex";
      renderUpdates();
    }

    function closeModal() {
      document.getElementById("mailModal").style.display = "none";
    }

    // Load updates when page loads
    loadUpdates();

    // Auto-refresh updates every 10 seconds
    // setInterval(loadUpdates, 10000);
  </script>


  

</body>

</html>
